name: Build

'on':
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

env: 
  CARGO_TERM_COLOR: always
  FM_HUNDO_PROTOCOL_VERSION: "1"

jobs:
  build-bizhawk:
    name: Build Bizhawk plugin DLL
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Visual Studio 2022
      uses: microsoft/setup-msbuild@v3
      with:
        vs-version: '17.0'  # VS 2022

    - name: Create BizHawk directory
      run: mkdir bizhawk_plugin\BizHawk
      working-directory: ${{ github.workspace }}

    - name: Download BizHawk
      run: |
        $url = "https://github.com/TASEmulators/BizHawk/releases/download/2.10/BizHawk-2.10-win-x64.zip"
        $output = "${{ github.workspace }}\bizhawk_plugin\BizHawk\BizHawk.zip"
        Invoke-WebRequest -Uri $url -OutFile $output
        Expand-Archive -Path $output -DestinationPath "${{ github.workspace }}\bizhawk_plugin\BizHawk\" -Force
        Remove-Item $output

    - name: Build project
      run: dotnet build -c Release
      working-directory: ${{ github.workspace }}/bizhawk_plugin/src

    - name: Upload YGOFMPlugin.dll as artifact
      uses: actions/upload-artifact@v7
      with:
        name: YGOFMPlugin
        path: ${{ github.workspace }}/bizhawk_plugin/src/bin/Release/net48/YGOFMPlugin.dll

  build-rust:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
        toolchain:
          - stable
          - beta
          - nightly
    name: Build middleware for ${{ matrix.os }} on Rust ${{ matrix.toolchain }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup cargo
        run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}

      - name: Build for Rust ${{ matrix.toolchain }}
        run: |
          cd middleware
          cargo build --verbose

  create-rust-artifacts:
    needs: build-rust
    strategy:
      matrix:
        os:
          - { pretty-name: Windows, ci-name: windows-latest }
          - { pretty-name: Linux, ci-name: ubuntu-latest }
    name: Release Build for ${{ matrix.os.ci-name }}
    runs-on: ${{ matrix.os.ci-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust stable
        run: rustup update stable && rustup default stable

      - name: Build (release)
        working-directory: ./middleware
        run: cargo build --release --verbose
      
      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir artifact
          if [ "$RUNNER_OS" == "Windows" ]; then
            cp middleware/target/release/FM_Sentinel.exe artifact/
            cp middleware/scripts/run_FM_Sentinel.bat artifact/
            cp middleware/scripts/TEST_FM_Sentinel.bat artifact/
          else
            cp middleware/target/release/FM_Sentinel artifact/
            cp middleware/scripts/run_FM_Sentinel.sh artifact/
            cp middleware/scripts/TEST_FM_Sentinel.sh artifact/
            chmod u+x artifact/*
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: FM_Sentinel-${{ matrix.os.pretty-name }}
          path: artifact/

  build-java:
    name: Build Java server JAR file
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    
    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'corretto'
        java-version: '25'
    
    - name: Run integration tests
      run: |
        cd server
        ./mvnw clean verify -Pintegration-test
    
    - name: Build JAR
      run: |
        cd server
        ./mvnw -Pproduction package -DskipTests
        mv target/server-1.0-SNAPSHOT.jar target/server.jar

    - name: Verify server protocol version stamp
      run: |
        cd server
        unzip -p target/server.jar BOOT-INF/classes/fm-hundo-build.properties | tee /tmp/fm-hundo-build.properties
        grep -Fx "protocol.version=${FM_HUNDO_PROTOCOL_VERSION}" /tmp/fm-hundo-build.properties
        if grep -Eq 'protocol\.version=$|[@$][{A-Za-z0-9_.-]+' /tmp/fm-hundo-build.properties; then
          echo "server.jar contains a blank or unresolved protocol.version stamp" >&2
          exit 1
        fi
    
    - name: Upload JAR as artifact
      uses: actions/upload-artifact@v7
      with:
        name: server
        path: server/target/server.jar

  build-livestats:
    name: Build LiveStats JAR file
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'corretto'
        java-version: '25'

    - name: Build and test LiveStats
      run: ./gradlew build
      working-directory: commentary/livestats

    - name: Prepare LiveStats artifact
      run: |
        mkdir -p artifact
        cp build/libs/livestats.jar artifact/LiveStats.jar
      working-directory: commentary/livestats

    - name: Upload LiveStats.jar as artifact
      uses: actions/upload-artifact@v7
      with:
        name: LiveStats.jar
        path: commentary/livestats/artifact/LiveStats.jar

  test-obs-ws:
    name: Test OBS WebSocket controller
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install OBS WebSocket controller
      run: python -m pip install -e .[dev]
      working-directory: commentary/obs_ws

    - name: Run OBS WebSocket controller tests
      run: python -m pytest
      working-directory: commentary/obs_ws
  
  build-api-docs:
    name: Build API docs
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install API docs tooling
      run: python -m pip install mkdocs PyYAML

    - name: Build API docs site
      run: python -m mkdocs build --strict --config-file api_docs/mkdocs.yml

    - name: Prepare API docs artifact
      run: |
        mkdir -p artifact
        cp -R api_docs_site/. artifact/

    - name: Upload API docs artifact
      uses: actions/upload-artifact@v7
      with:
        name: api_docs
        path: artifact/

  package-duckstation-patch:
    name: Package DuckStation patch
    runs-on: ubuntu-latest
  
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: duckstation_patch
        path: duckstation_patch/

  test-api-openapi-compliance:
    name: Test server artifact against OpenAPI spec
    needs:
      - build-bizhawk
      - create-rust-artifacts
      - build-java
      - build-livestats
      - build-api-docs
      - package-duckstation-patch
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Download server artifact
      uses: actions/download-artifact@v7
      with:
        name: server
        path: downloaded-artifacts/server

    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'corretto'
        java-version: '25'

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Copy H2 test dependency
      run: >-
        ./mvnw -q dependency:copy-dependencies
        -DincludeArtifactIds=h2
        -DincludeScope=test
        -DoutputDirectory="$GITHUB_WORKSPACE/openapi-test-lib"
      working-directory: server

    - name: Install OpenAPI compliance tooling
      run: python -m pip install schemathesis

    - name: Start server artifact
      run: |
        java -cp "downloaded-artifacts/server/server.jar:openapi-test-lib/*" \
          org.springframework.boot.loader.launch.JarLauncher \
          --server.port=8080 \
          '--spring.datasource.url=jdbc:h2:mem:openapi;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1' \
          --spring.datasource.driver-class-name=org.h2.Driver \
          --spring.datasource.username=sa \
          --spring.datasource.password=as \
          --spring.jpa.hibernate.ddl-auto=create-drop \
          --spring.jpa.database-platform=org.hibernate.dialect.H2Dialect \
          --spring.security.oauth2.client.registration.twitch.client-id=fake \
          --spring.security.oauth2.client.registration.twitch.client-secret=fake \
          --hundo.twitch-vod.enabled=false \
          > server.log 2>&1 &
        echo $! > server.pid

    - name: Wait for server API
      run: |
        for attempt in {1..90}; do
          if curl --fail --silent --show-error http://127.0.0.1:8080/api/protocol_version; then
            exit 0
          fi
          sleep 2
        done
        cat server.log
        exit 1

    - name: Run Schemathesis OpenAPI compliance tests
      run: >-
        st run api_docs/schemas/openapi.yaml
        --url http://127.0.0.1:8080/api
        --phases examples,coverage
        --checks not_a_server_error,status_code_conformance,content_type_conformance,response_schema_conformance
        --max-failures 1

    - name: Print server logs
      if: always()
      run: cat server.log || true

    - name: Stop server artifact
      if: always()
      run: |
        if [ -f server.pid ]; then
          kill "$(cat server.pid)" || true
        fi

  release:
    name: Create GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-bizhawk
      - create-rust-artifacts
      - build-java
      - build-livestats
      - test-api-openapi-compliance
      - build-api-docs
      - package-duckstation-patch
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v7
      with:
        path: downloaded-artifacts

    - name: Prepare release assets
      run: |
        mkdir -p release-assets

        cp downloaded-artifacts/YGOFMPlugin/YGOFMPlugin.dll release-assets/YGOFMPlugin.dll
        cp downloaded-artifacts/server/server.jar release-assets/server.jar
        cp downloaded-artifacts/LiveStats.jar/LiveStats.jar release-assets/LiveStats.jar

        (cd downloaded-artifacts/FM_Sentinel-Windows && zip -r "$GITHUB_WORKSPACE/release-assets/FM_Sentinel-Windows.zip" .)
        (cd downloaded-artifacts/FM_Sentinel-Linux && zip -r "$GITHUB_WORKSPACE/release-assets/FM_Sentinel-Linux.zip" .)
        (cd downloaded-artifacts/api_docs && zip -r "$GITHUB_WORKSPACE/release-assets/api_docs.zip" .)
        (cd downloaded-artifacts/duckstation_patch && zip -r "$GITHUB_WORKSPACE/release-assets/duckstation_patch.zip" .)

        ls -la release-assets

    - name: Generate artifact attestations
      uses: actions/attest@v4
      with:
        subject-path: release-assets/*

    - name: Create release
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
      run: |
        gh release create "$GITHUB_REF_NAME" release-assets/* --verify-tag --generate-notes \
          --notes "Release assets are provenance-attested by this repository's GitHub Actions workflow. See https://github.com/sg4e/FM_Team_Hundo/attestations"
