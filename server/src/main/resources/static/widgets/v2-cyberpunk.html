<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Acquisitions - Cyberpunk</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a12;
            --text-color: #00f3ff;
            --border-color: #ff00ff;
            --item-bg: #11111a;
            --glow: 0 0 8px rgba(0, 243, 255, 0.6), 0 0 15px rgba(255, 0, 255, 0.4);
        }
        body {
            margin: 0;
            padding: 10px;
            font-family: 'Orbitron', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            width: 240px;
            box-sizing: border-box;
        }
        .acquisition-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .acquisition-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: var(--item-bg);
            border: 1px solid var(--border-color);
            border-radius: 2px;
            padding: 8px;
            box-shadow: var(--glow);
            opacity: 0;
            transform: translateY(30px);
            animation: slideInBottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .acquisition-item.slide-top {
            transform: translateY(-30px);
            animation: slideInTop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes slideInTop {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideInBottom {
            to { opacity: 1; transform: translateY(0); }
        }
        .card-image {
            width: 40px;
            height: 56px;
            object-fit: cover;
            border-radius: 2px;
            border: 1px solid var(--text-color);
            box-shadow: 0 0 5px var(--text-color);
            flex-shrink: 0;
        }
        .card-name {
            font-size: 12px;
            font-weight: 700;
            line-height: 1.3;
            flex: 1;
            word-break: break-word;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <ul class="acquisition-list" id="acquisitionList"></ul>

    <script>
        const params = new URLSearchParams(window.location.search);
        const teamId = parseInt(params.get('teamId') || '0', 10);
        const limit = parseInt(params.get('limit') || '5', 10);
        const direction = params.get('direction') || 'bottom';

        let cardMap = {};
        const list = document.getElementById('acquisitionList');
        let acquisitions = [];

        async function init() {
            try {
                const response = await fetch('cardinfo.json');
                const data = await response.json();
                data.forEach(item => {
                    cardMap[item.cardId] = item.cardName;
                });
                connectWebSocket();
            } catch (error) {
                console.error('Failed to load cardinfo.json:', error);
            }
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/firehose/team`;
            const ws = new WebSocket(wsUrl);

            ws.onopen = () => console.log('WebSocket connected');
            ws.onclose = () => {
                console.log('WebSocket closed, reconnecting in 2s...');
                setTimeout(connectWebSocket, 2000);
            };
            ws.onerror = (error) => console.error('WebSocket error:', error);

            ws.onmessage = (event) => {
                try {
                    const payload = JSON.parse(event.data);
                    if (payload.teamId !== teamId || !payload.newAcquisitions) return;

                    payload.newAcquisitions.forEach(acq => {
                        addAcquisition(acq);
                    });
                } catch (e) {
                    console.error('Failed to parse WS message:', e);
                }
            };
        }

        function addAcquisition(acq) {
            const cardIdStr = String(acq.cardId).padStart(3, '0');
            const cardName = cardMap[acq.cardId] || `UNKNOWN (${acq.cardId})`;
            const imageUrl = `https://hundo.maika.moe/nginx_managed/cards/${cardIdStr}.PNG`;

            const li = document.createElement('li');
            li.className = `acquisition-item ${direction === 'top' ? 'slide-top' : ''}`;
            li.innerHTML = `
                <img src="${imageUrl}" alt="${cardName}" class="card-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2256%22><rect width=%2240%22 height=%2256%22 fill=%22%23111%22 stroke=%22%2300f3ff%22/></svg>'">
                <span class="card-name">${cardName}</span>
            `;

            if (direction === 'top') {
                list.prepend(li);
                acquisitions.unshift(acq);
            } else {
                list.appendChild(li);
                acquisitions.push(acq);
            }

            if (acquisitions.length > limit) {
                if (direction === 'top') {
                    acquisitions.pop();
                    list.removeChild(list.lastElementChild);
                } else {
                    acquisitions.shift();
                    list.removeChild(list.firstElementChild);
                }
            }
        }

        init();
    </script>
</body>
</html>
