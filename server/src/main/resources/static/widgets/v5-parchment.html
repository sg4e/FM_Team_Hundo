<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Acquisitions - Parchment</title>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4e4c1;
            --text-color: #3b2f1e;
            --border-color: #8b6914;
            --item-bg: #efe0b5;
            --accent: #6b3a1f;
        }
        body {
            margin: 0;
            padding: 12px;
            font-family: 'Cinzel', 'IM Fell English SC', Georgia, serif;
            background-color: var(--bg-color);
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><rect width='100' height='100' fill='none'/><rect width='50' height='50' fill='none'/></svg>");
            color: var(--text-color);
            width: 240px;
            box-sizing: border-box;
            border: 3px double var(--accent);
            border-radius: 4px;
            box-shadow: inset 0 0 30px rgba(139,105,20,0.15);
            position: relative;
        }
        body::after {
            content: "";
            position: absolute;
            top: -6px; left: -6px; right: -6px; bottom: -6px;
            border: 2px solid var(--accent);
            border-radius: 6px;
            pointer-events: none;
            opacity: 0.4;
        }
        .acquisition-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .acquisition-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: var(--item-bg);
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--accent);
            border-radius: 2px;
            padding: 7px;
            opacity: 0;
            transform: rotate(-2deg) translateY(-10px);
            animation: unrollScroll 0.6s ease-out forwards;
            box-shadow: 0 1px 3px rgba(59,47,30,0.2);
            position: relative;
        }
        .acquisition-item::before {
            content: "✦";
            position: absolute;
            left: -8px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 6px;
            opacity: 0.6;
        }
        .acquisition-item.slide-bottom {
            transform: rotate(2deg) translateY(10px);
            animation: unrollScrollBottom 0.6s ease-out forwards;
        }
        @keyframes unrollScroll {
            to { opacity: 1; transform: rotate(0) translateY(0); }
        }
        @keyframes unrollScrollBottom {
            to { opacity: 1; transform: rotate(0) translateY(0); }
        }
        .card-image {
            width: 40px;
            height: 56px;
            object-fit: cover;
            border-radius: 2px;
            border: 1px solid var(--border-color);
            box-shadow: 0 1px 2px rgba(59,47,30,0.3);
            flex-shrink: 0;
            filter: sepia(0.2);
        }
        .card-name {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.3;
            flex: 1;
            word-break: break-word;
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>
    <ul class="acquisition-list" id="acquisitionList"></ul>

    <script>
        const params = new URLSearchParams(window.location.search);
        const teamId = parseInt(params.get('teamId') || '0', 10);
        const limit = parseInt(params.get('limit') || '5', 10);
        const direction = params.get('direction') || 'top';

        let cardMap = {};
        const list = document.getElementById('acquisitionList');
        let acquisitions = [];

        async function init() {
            try {
                const response = await fetch('cardinfo.json');
                const data = await response.json();
                data.forEach(item => {
                    cardMap[item.cardId] = item.cardName;
                });
                connectWebSocket();
            } catch (error) {
                console.error('Failed to load cardinfo.json:', error);
            }
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/firehose/team`;
            const ws = new WebSocket(wsUrl);

            ws.onopen = () => console.log('WebSocket connected');
            ws.onclose = () => {
                console.log('WebSocket closed, reconnecting in 2s...');
                setTimeout(connectWebSocket, 2000);
            };
            ws.onerror = (error) => console.error('WebSocket error:', error);

            ws.onmessage = (event) => {
                try {
                    const payload = JSON.parse(event.data);
                    if (payload.teamId !== teamId || !payload.newAcquisitions) return;

                    payload.newAcquisitions.forEach(acq => {
                        addAcquisition(acq);
                    });
                } catch (e) {
                    console.error('Failed to parse WS message:', e);
                }
            };
        }

        function addAcquisition(acq) {
            const cardIdStr = String(acq.cardId).padStart(3, '0');
            const cardName = cardMap[acq.cardId] || `Unknown Card (${acq.cardId})`;
            const imageUrl = `https://hundo.maika.moe/nginx_managed/cards/${cardIdStr}.PNG`;

            const li = document.createElement('li');
            li.className = `acquisition-item ${direction === 'bottom' ? 'slide-bottom' : ''}`;
            li.innerHTML = `
                <img src="${imageUrl}" alt="${cardName}" class="card-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2256%22><rect width=%2240%22 height=%2256%22 fill=%22%23efe0b5%22 stroke=%22%238b6914%22/></svg>'">
                <span class="card-name">${cardName}</span>
            `;

            if (direction === 'top') {
                list.prepend(li);
                acquisitions.unshift(acq);
            } else {
                list.appendChild(li);
                acquisitions.push(acq);
            }

            if (acquisitions.length > limit) {
                if (direction === 'top') {
                    acquisitions.pop();
                    list.removeChild(list.lastElementChild);
                } else {
                    acquisitions.shift();
                    list.removeChild(list.firstElementChild);
                }
            }
        }

        init();
    </script>
</body>
</html>
