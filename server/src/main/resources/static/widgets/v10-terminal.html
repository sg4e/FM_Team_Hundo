<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Acquisitions - Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        :root { --bg:#021006; --grid:#0d2c14; --green:#71ff8a; --dim:#2bbb55; }
        body { margin:0; padding:10px; width:240px; box-sizing:border-box; color:var(--green); font-family:'Share Tech Mono', monospace; background:linear-gradient(rgba(113,255,138,.06) 50%, transparent 50%), radial-gradient(circle at center, #073817, var(--bg)); background-size:100% 4px, 100% 100%; text-shadow:0 0 6px rgba(113,255,138,.7); }
        .acquisition-list { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:7px; }
        .acquisition-item { display:grid; grid-template-columns:34px 1fr; gap:8px; align-items:center; padding:7px; border-left:4px solid var(--green); background:rgba(0,0,0,.55); clip-path:polygon(0 0, 94% 0, 100% 18%, 100% 100%, 0 100%); box-shadow:inset 0 0 0 1px rgba(113,255,138,.35); opacity:0; transform:translateX(-18px); animation:bootLine .35s steps(4,end) forwards; }
        .acquisition-item.slide-top, .acquisition-item.slide-bottom { transform:translateX(18px); }
        @keyframes bootLine { to { opacity:1; transform:translateX(0); } }
        .card-image { width:32px; height:45px; object-fit:cover; filter:grayscale(1) contrast(1.35) sepia(1) hue-rotate(65deg) saturate(4); border:1px solid var(--dim); }
        .card-name { font-size:12px; line-height:1.15; text-transform:uppercase; }
        .prefix { color:var(--dim); display:block; font-size:10px; }
    </style>
</head>
<body>
    <ul class="acquisition-list" id="acquisitionList"></ul>

    <script src="acquisition-widget-core.js"></script>
    <script>
        FmAcquisitionWidget.create({
            defaultDirection: 'bottom',
            renderItem(acq, { cardName, imageUrl, direction, placeholder, createCardImage }) {
            const li = document.createElement('li');
                        li.className = `acquisition-item ${direction === 'top' ? 'slide-top' : ''}`;
                        const img = createCardImage({ src: imageUrl, alt: cardName, className: 'card-image', fallbackSrc: placeholder('#021006', '#71ff8a', 'ERR') });
                        const wrap = document.createElement('span');
                        const prefix = document.createElement('span'); prefix.className = 'prefix'; prefix.textContent = `> CARD_${String(acq.cardId).padStart(3, '0')}`;
                        const name = document.createElement('span'); name.className = 'card-name'; name.textContent = cardName;
                        wrap.append(prefix, name); li.append(img, wrap);
                        return li;
            }
        });
    </script>
</body>
</html>
