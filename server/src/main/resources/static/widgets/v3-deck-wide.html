<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Acquisitions - Deck Wide</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --text-color: #e0e0e0;
            --card-bg: #2a2a35;
            --accent: #ffd700;
        }
        body {
            margin: 0;
            padding: 15px;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            width: 450px;
            box-sizing: border-box;
            perspective: 800px;
        }
        .acquisition-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0;
            position: relative;
        }
        .acquisition-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: var(--card-bg);
            border: 1px solid #3a3a45;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: -25px;
            opacity: 0;
            transform: translateY(-40px) rotateX(-10deg) scale(0.9);
            animation: dealCard 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }
        .acquisition-item.slide-bottom {
            transform: translateY(40px) rotateX(10deg) scale(0.9);
            animation: dealCardBottom 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes dealCard {
            to { opacity: 1; transform: translateY(0) rotateX(0) scale(1); }
        }
        @keyframes dealCardBottom {
            to { opacity: 1; transform: translateY(0) rotateX(0) scale(1); }
        }
        .acquisition-item:hover {
            z-index: 10;
            transform: translateY(-5px) scale(1.05);
            transition: transform 0.2s ease, z-index 0s;
        }
        .card-image {
            width: 60px;
            height: 84px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid var(--accent);
            flex-shrink: 0;
        }
        .card-name {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.3;
            flex: 1;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <ul class="acquisition-list" id="acquisitionList"></ul>

    <script>
        const params = new URLSearchParams(window.location.search);
        const teamId = parseInt(params.get('teamId') || '0', 10);
        const limit = parseInt(params.get('limit') || '5', 10);
        const direction = params.get('direction') || 'top';

        let cardMap = {};
        const list = document.getElementById('acquisitionList');
        let acquisitions = [];

        async function init() {
            try {
                const response = await fetch('cardinfo.json');
                const data = await response.json();
                data.forEach(item => {
                    cardMap[item.cardId] = item.cardName;
                });
                connectWebSocket();
            } catch (error) {
                console.error('Failed to load cardinfo.json:', error);
            }
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/firehose/team`;
            const ws = new WebSocket(wsUrl);

            ws.onopen = () => console.log('WebSocket connected');
            ws.onclose = () => {
                console.log('WebSocket closed, reconnecting in 2s...');
                setTimeout(connectWebSocket, 2000);
            };
            ws.onerror = (error) => console.error('WebSocket error:', error);

            ws.onmessage = (event) => {
                try {
                    const payload = JSON.parse(event.data);
                    if (payload.teamId !== teamId || !payload.newAcquisitions) return;

                    payload.newAcquisitions.forEach(acq => {
                        addAcquisition(acq);
                    });
                } catch (e) {
                    console.error('Failed to parse WS message:', e);
                }
            };
        }

        function addAcquisition(acq) {
            const cardIdStr = String(acq.cardId).padStart(3, '0');
            const cardName = cardMap[acq.cardId] || `Unknown Card (${acq.cardId})`;
            const imageUrl = `https://hundo.maika.moe/nginx_managed/cards/${cardIdStr}.PNG`;

            const li = document.createElement('li');
            li.className = `acquisition-item ${direction === 'bottom' ? 'slide-bottom' : ''}`;
            li.innerHTML = `
                <img src="${imageUrl}" alt="${cardName}" class="card-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2284%22><rect width=%2260%22 height=%2284%22 fill=%22%232a2a35%22 stroke=%22%23ffd700%22/></svg>'">
                <span class="card-name">${cardName}</span>
            `;

            if (direction === 'top') {
                list.prepend(li);
                acquisitions.unshift(acq);
            } else {
                list.appendChild(li);
                acquisitions.push(acq);
            }

            if (acquisitions.length > limit) {
                if (direction === 'top') {
                    acquisitions.pop();
                    list.removeChild(list.lastElementChild);
                } else {
                    acquisitions.shift();
                    list.removeChild(list.firstElementChild);
                }
            }
        }

        init();
    </script>
</body>
</html>
