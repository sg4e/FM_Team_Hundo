<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Acquisitions - Hologram</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: transparent;
            --text-color: #7df9ff;
            --border-color: rgba(125,249,255,0.4);
            --item-bg: rgba(0,50,80,0.25);
            --glow: 0 0 12px rgba(125,249,255,0.3);
        }
        body {
            margin: 0;
            padding: 10px;
            font-family: 'Share Tech Mono', monospace;
            color: var(--text-color);
            width: 240px;
            box-sizing: border-box;
            background: radial-gradient(ellipse at 50% 30%, rgba(20,60,100,0.15) 0%, transparent 70%);
            position: relative;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(125,249,255,0.03) 2px, rgba(125,249,255,0.03) 4px);
            pointer-events: none;
            z-index: 2;
        }
        .acquisition-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            z-index: 1;
        }
        .acquisition-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--item-bg);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 7px;
            box-shadow: var(--glow), inset 0 0 15px rgba(125,249,255,0.05);
            opacity: 0;
            filter: blur(6px);
            transform: scale(0.85);
            animation: materialize 0.55s ease-out forwards;
        }
        .acquisition-item.slide-bottom {
            filter: blur(6px);
            transform: scale(0.85) translateY(20px);
            animation: materializeBottom 0.55s ease-out forwards;
        }
        @keyframes materialize {
            to { opacity: 1; filter: blur(0); transform: scale(1); }
        }
        @keyframes materializeBottom {
            to { opacity: 1; filter: blur(0); transform: scale(1) translateY(0); }
        }
        .card-image {
            width: 40px;
            height: 56px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid rgba(125,249,255,0.5);
            box-shadow: 0 0 10px rgba(125,249,255,0.25);
            flex-shrink: 0;
            filter: brightness(0.9) saturate(0.7);
        }
        .card-name {
            font-size: 12px;
            font-weight: 400;
            line-height: 1.3;
            flex: 1;
            word-break: break-word;
            letter-spacing: 0.5px;
            text-shadow: 0 0 6px rgba(125,249,255,0.4);
        }
    </style>
</head>
<body>
    <ul class="acquisition-list" id="acquisitionList"></ul>

    <script>
        const params = new URLSearchParams(window.location.search);
        const teamId = parseInt(params.get('teamId') || '0', 10);
        const limit = parseInt(params.get('limit') || '5', 10);
        const direction = params.get('direction') || 'bottom';

        let cardMap = {};
        const list = document.getElementById('acquisitionList');
        let acquisitions = [];

        async function init() {
            try {
                const response = await fetch('cardinfo.json');
                const data = await response.json();
                data.forEach(item => {
                    cardMap[item.cardId] = item.cardName;
                });
                connectWebSocket();
            } catch (error) {
                console.error('Failed to load cardinfo.json:', error);
            }
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/firehose/team`;
            const ws = new WebSocket(wsUrl);

            ws.onopen = () => console.log('WebSocket connected');
            ws.onclose = () => {
                console.log('WebSocket closed, reconnecting in 2s...');
                setTimeout(connectWebSocket, 2000);
            };
            ws.onerror = (error) => console.error('WebSocket error:', error);

            ws.onmessage = (event) => {
                try {
                    const payload = JSON.parse(event.data);
                    if (payload.teamId !== teamId || !payload.newAcquisitions) return;

                    payload.newAcquisitions.forEach(acq => {
                        addAcquisition(acq);
                    });
                } catch (e) {
                    console.error('Failed to parse WS message:', e);
                }
            };
        }

        function addAcquisition(acq) {
            const cardIdStr = String(acq.cardId).padStart(3, '0');
            const cardName = cardMap[acq.cardId] || `UNKNOWN #${acq.cardId}`;
            const imageUrl = `https://hundo.maika.moe/nginx_managed/cards/${cardIdStr}.PNG`;

            const li = document.createElement('li');
            li.className = `acquisition-item ${direction === 'top' ? 'slide-top' : ''}`;
            li.innerHTML = `
                <img src="${imageUrl}" alt="${cardName}" class="card-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2256%22><rect width=%2240%22 height=%2256%22 fill=%22rgba(0,50,80,0.5)%22 stroke=%22%237df9ff%22/></svg>'">
                <span class="card-name">${cardName}</span>
            `;

            if (direction === 'top') {
                list.prepend(li);
                acquisitions.unshift(acq);
            } else {
                list.appendChild(li);
                acquisitions.push(acq);
            }

            if (acquisitions.length > limit) {
                if (direction === 'top') {
                    acquisitions.pop();
                    list.removeChild(list.lastElementChild);
                } else {
                    acquisitions.shift();
                    list.removeChild(list.firstElementChild);
                }
            }
        }

        init();
    </script>
</body>
</html>
