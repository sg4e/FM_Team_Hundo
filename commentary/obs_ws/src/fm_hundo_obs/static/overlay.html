<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FM Hundo Overlay</title>
  <style>
    :root {
      --canvas-width: __CANVAS_WIDTH__;
      --canvas-height: __CANVAS_HEIGHT__;
      --gold: #f5c542;
      --fusion: #ff6b7f;
      --ritual: #a879ff;
      --ink: #111318;
      --cyan: #57d7ff;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }

    .banner {
      position: absolute;
      left: 0;
      width: 100vw;
      height: 58px;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: linear-gradient(90deg, var(--ink), #26313a, var(--ink));
      --banner-accent: var(--gold);
      --banner-glow: rgba(245, 197, 66, 0.45);
      border-block: 2px solid var(--banner-accent);
      box-shadow: 0 0 22px var(--banner-glow);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: transform 300ms ease, opacity 300ms ease;
    }

    .banner.source-drop {
      --banner-accent: var(--gold);
      --banner-glow: rgba(245, 197, 66, 0.45);
    }

    .banner.source-fuse {
      --banner-accent: var(--fusion);
      --banner-glow: rgba(255, 107, 127, 0.45);
    }

    .banner.source-ritual {
      --banner-accent: var(--ritual);
      --banner-glow: rgba(168, 121, 255, 0.45);
    }

    .banner.top { top: 0; transform: translateY(-110%); }
    .banner.bottom { bottom: 0; transform: translateY(110%); }
    .banner.is-entering,
    .banner.is-visible,
    .banner.is-exiting {
      visibility: visible;
      opacity: 1;
    }
    .banner.is-entering,
    .banner.is-visible { transform: translateY(0); }

    .track {
      white-space: nowrap;
      font-size: 30px;
      font-weight: 900;
      color: white;
      text-transform: uppercase;
      text-shadow: 0 2px 0 rgba(0,0,0,0.55);
      animation: scroll 9s linear infinite;
    }

    .source-word {
      color: var(--banner-accent);
    }

    .bottom .track { animation-direction: reverse; }

    @keyframes scroll {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .intro-wrapper {
      position: absolute;
      left: 50%;
      bottom: __INTRO_BOTTOM__;
      display: flex;
      align-items: center;
      gap: 0;
      transform: translateX(-50%) translateY(28px);
      opacity: 0;
      pointer-events: none;
    }

    .intro-wrapper.active {
      animation: introIn 220ms ease-out forwards, introOut 260ms ease-in forwards;
      animation-delay: 0ms, var(--intro-hide-delay);
    }

    .intro-img {
      height: 100px;
      width: auto;
      flex-shrink: 0;
      object-fit: contain;
      display: block;
    }

    .intro-img.hidden {
      display: none;
    }

    .intro {
      min-width: min(760px, 82vw);
      color: white;
      background: rgba(17, 19, 24, 0.88);
      border-left: 8px solid var(--cyan);
      padding: 18px 24px 20px;
      box-shadow: 0 18px 55px rgba(0,0,0,0.5);
    }

    .player {
      font-size: 42px;
      font-weight: 900;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .opponent {
      margin-top: 6px;
      font-size: 24px;
      font-weight: 700;
      color: var(--gold);
      overflow-wrap: anywhere;
    }

    @keyframes introIn {
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @keyframes introOut {
      to { opacity: 0; transform: translateX(-50%) translateY(24px); }
    }
  </style>
</head>
<body>
  <div class="banner top"><div class="track"></div></div>
  <div class="banner bottom"><div class="track"></div></div>
  <div class="intro-wrapper">
    <img class="intro-img" id="player-profile" src="" alt="">
    <div class="intro">
      <div class="player"></div>
      <div class="opponent"></div>
    </div>
    <img class="intro-img" id="opponent-portrait" src="" alt="">
  </div>

  <script>
    const topBanner = document.querySelector(".banner.top");
    const bottomBanner = document.querySelector(".banner.bottom");
    const tracks = document.querySelectorAll(".track");
    const introWrapper = document.querySelector(".intro-wrapper");
    const playerProfile = document.getElementById("player-profile");
    const opponentPortrait = document.getElementById("opponent-portrait");
    const player = document.querySelector(".player");
    const opponent = document.querySelector(".opponent");
    let bannerTimer = null;
    let bannerExitTimer = null;
    let bannerCleanupTimer = null;
    let introTimer = null;
    const sourceClasses = ["source-drop", "source-fuse", "source-ritual"];
    const sourceWords = {
      drop: "Drop",
      fuse: "Fusion",
      ritual: "Ritual",
    };

    function appendLabel(track, label, source) {
      const sourceWord = sourceWords[source];
      for (let i = 0; i < 18; i += 1) {
        track.append("   ✦   ");
        if (sourceWord && label.includes(sourceWord)) {
          const [before, after] = label.split(sourceWord, 2);
          const word = document.createElement("span");
          word.className = "source-word";
          word.textContent = sourceWord;
          track.append(before, word, after);
        } else {
          track.append(label);
        }
        track.append("   ✦   ");
      }
    }

    function setBannerSource(source) {
      const normalized = sourceWords[source] ? source : "drop";
      [topBanner, bottomBanner].forEach(banner => {
        banner.classList.remove(...sourceClasses);
        banner.classList.add(`source-${normalized}`);
      });
    }

    function showBanner(payload) {
      clearTimeout(bannerTimer);
      clearTimeout(bannerExitTimer);
      clearTimeout(bannerCleanupTimer);
      const source = sourceWords[payload.source] ? payload.source : "drop";
      const total = Math.max(0, Number(payload.durationSeconds || 30));
      const enter = Math.max(0, Number(payload.enterSeconds || 0.3));
      const exit = Math.max(0, Number(payload.exitSeconds || 0.3));
      const hold = Math.max(0, total - enter - exit);
      setBannerSource(source);
      tracks.forEach(track => {
        track.replaceChildren();
        appendLabel(track, payload.label || "Alert", source);
      });
      [topBanner, bottomBanner].forEach(banner => {
        banner.style.transitionDuration = `${enter}s`;
        banner.classList.remove("is-exiting", "is-visible", "is-entering");
        void banner.offsetWidth;
        banner.classList.add("is-entering");
      });
      bannerTimer = setTimeout(() => {
        [topBanner, bottomBanner].forEach(banner => {
          banner.classList.remove("is-entering");
          banner.classList.add("is-visible");
        });
      }, enter * 1000);
      bannerExitTimer = setTimeout(() => {
        [topBanner, bottomBanner].forEach(banner => {
          banner.style.transitionDuration = `${exit}s`;
          banner.classList.remove("is-entering", "is-visible");
          banner.classList.add("is-exiting");
        });
      }, (enter + hold) * 1000);
      bannerCleanupTimer = setTimeout(() => {
        [topBanner, bottomBanner].forEach(banner => {
          banner.classList.remove("is-entering", "is-visible", "is-exiting");
        });
      }, (enter + hold + exit) * 1000);
    }

    function showIntro(payload) {
      clearTimeout(introTimer);
      player.textContent = payload.playerName || "Player";
      opponent.textContent = `vs ${payload.opponentName || "Opponent"}`;

      // Set profile image (left).
      const useTwitch = payload.useTwitchProfile !== false;
      playerProfile.src = `/profile/${useTwitch ? (payload.playerId || 0) : 0}`;
      playerProfile.classList.toggle("hidden", false);

      // Set opponent portrait (right).
      opponentPortrait.src = `/duelist/${payload.opponentId || 0}`;
      opponentPortrait.classList.toggle("hidden", false);

      introWrapper.classList.remove("active");
      void introWrapper.offsetWidth;
      const duration = Math.max(0.5, Number(payload.durationSeconds || 3));
      introWrapper.style.setProperty("--intro-hide-delay", `${Math.max(0, duration - 0.26)}s`);
      introWrapper.classList.add("active");
      introTimer = setTimeout(() => introWrapper.classList.remove("active"), duration * 1000);
    }

    function connect() {
      const scheme = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${scheme}://${location.host}/events`);
      ws.onmessage = event => {
        const message = JSON.parse(event.data);
        if (message.type === "banner") showBanner(message.payload);
        if (message.type === "intro") showIntro(message.payload);
      };
      ws.onclose = () => setTimeout(connect, 1000);
    }

    connect();
  </script>
</body>
</html>
