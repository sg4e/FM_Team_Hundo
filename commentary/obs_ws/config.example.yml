api:
  base_url: "https://hundo.maika.moe"

obs:
  host: "127.0.0.1"
  port: 4455
  password: null
  overlay_scene: "FM Hundo Overlay"
  overlay_source: "FM Hundo Overlay Browser"
  managed_scene_prefix: "FM Hundo"
  media_source_kind: "ffmpeg_source"
  text_source_kind: "text_gdiplus_v3"
  browser_source_kind: "browser_source"
  stream_volume_mul: null   # Required. Linear volume multiplier for stream inputs (1.0 = 0 dB, 0.25 ≈ -12 dB).
  alert_audio_volume_mul: 1.0   # Linear volume multiplier for the alert audio source (1.0 = 0 dB, 0.25 ≈ -12 dB).
  alert_audio_path: null   # Required. Absolute or relative path to alert sound file.
  alert_audio_source: null   # defaults to "{managed_scene_prefix} Alert Audio"
  # Optional ordered filter chain applied to every managed player stream Media Source.
  # Filter names/kinds/settings are passed through to OBS, so this can manage
  # compressors, limiters, and future OBS audio filters. Compressor sidechain
  # ducking uses settings.sidechain_source with an exact OBS audio source name.
  stream_audio_filters:
    enabled: false
    sync_settings: true   # true = YAML is authoritative; false = leave existing OBS settings alone.
    filters:
      - name: "FM Hundo Stream Compressor"
        kind: "compressor_filter"
        enabled: true
        settings:
          ratio: 6.0
          threshold: -18.0
          attack_time: 6
          release_time: 60
          output_gain: 0.0
      - name: "FM Hundo Commentary Duck"
        kind: "compressor_filter"
        enabled: true
        settings:
          ratio: 10.0
          threshold: -24.0
          attack_time: 6
          release_time: 250
          output_gain: 0.0
          sidechain_source: "Production Commentary Bus"
  # Optional production-owned master scenes. Python creates the empty scenes if
  # configured, nests them into generated scenes, and never edits their contents.
  all_managed_master_scene: null
  stream_layout_master_scene: null
  credits_scene: null
  credits_source: null
  dry_run: false

overlay:
  host: "127.0.0.1"
  port: 8765
  connect_timeout_seconds: 10
  intro_bottom_px: 92
  canvas_width: 1920
  canvas_height: 1080

mediamtx:
  api_base_url: "http://127.0.0.1:9997"
  rtsp_base_url: "rtsp://127.0.0.1:8554"
  poll_seconds: 2

timing:
  acquisition_window_seconds: 30
  banner_delay_seconds: 0.0
  banner_enter_seconds: 0.3
  banner_exit_seconds: 0.3
  banner_end_buffer_seconds: 0.08
  banner_total_seconds: null  # optional; if set, must be <= acquisition_window_seconds - banner_end_buffer_seconds
  intro_seconds: 3
  intro_delay_seconds: 0
  all_streamers_audio_seconds: 180
  team_showcase_seconds: 180
  alert_audio_duration_seconds: 3.0

credits:
  # Defaults to credits_scene.yml beside this config file.
  config_path: null

features:
  paused: false
  scene_switching: true
  intro_overlay: true
  banner_overlay: true
  audio_rotation: true
  alert_audio: true

portraits:
  # Required. Path to extracted duelist portrait directory (e.g. ygofm_portraits/extracted_portraits).
  # Directory must contain duelist_*.png files matching opponent IDs.
  # Path is relative to this config file if not absolute.
  directory: ""

twitch:
  # Required in production mode. Used to fetch player Twitch profile images for the cut-in popup.
  client_id: ""
  client_secret: ""

# Player stream paths are derived from /api/players twitchId:
# rtsp://127.0.0.1:8554/{twitchId}
